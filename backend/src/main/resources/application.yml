server:
  address: 0.0.0.0
  port: 8080

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: cms-rule

  datasource:
    url: jdbc:mysql://localhost:3306/cms-rule-db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: cmsrule
    password: cmsrule123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# cms-rule specific config
cms-rule:
  iot:
    remote-url: http://localhost:9999
  cmd:
    remote-url: http://localhost:9998
  jwt:
    secret: dev-secret-key-change-in-production
  engine:
    max-loop-per-node: 10
    script-timeout-seconds: 5
  cache:
    enabled: false
    point-ttl-seconds: 300