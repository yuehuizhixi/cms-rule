# ============================================
# CMS Rule Engine - 公共配置（跨环境共享）
# ============================================
spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: cms-rule
  profiles:
    active: dev   # 默认 dev，生产通过 java -jar -Dspring.profiles.active=prod 切换

  cloud:
    openfeign:
      client:
        config:
          cmd-service:
            connect-timeout: 5000
            read-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# Actuator 公共配置
management:
  endpoints:
    web:
      exposure:
        include: health,info,readiness
  endpoint:
    health:
      show-details: when_authorized

# cms-rule 引擎公共配置
cms-rule:
  engine:
    max-loop-per-node: 10
    script-timeout-seconds: 5
  cache:
    enabled: false
    point-ttl-seconds: 300
  rate-limit:
    default-qps: 100
    burst-seconds: 2
