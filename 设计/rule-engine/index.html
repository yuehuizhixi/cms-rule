<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>规则引擎管理</title>

  <!-- 第三方库：JSZip（用于批量导出/导入 ZIP） -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <!-- 全局样式 -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="tabbar" id="tabbar">
  <div class="tadd" id="btn-add-tab">
    <span class="tab-add-icon">＋</span>新增分组
    </div>
    <div class="tsc" id="tsc">
    </div>
  </div>
  <div class="topbar">
    <div class="fgp">
      <span class="flb">规则名称</span>
      <input id="filter-name" type="text" placeholder="请输入" />
      <div class="fsp">
      </div>
      <span class="flb">规则描述</span>
      <input id="filter-desc" type="text" placeholder="请输入" />
      <div class="fsp">
      </div>
      <span class="flb">启用状态</span>
      <select id="filter-status">
        <option value="">全部</option>
        <option value="on">启用中</option>
        <option value="off">已停用</option>
        <option value="draft">暂存中</option>
      </select>
    </div>
    <div class="spacer">
    </div>
    <button class="btn primary" id="btn-new-rule">+ 新建规则</button>
    <button class="btn danger" id="btn-batch-del">批量删除</button>
    <button class="btn ghost" id="btn-batch-import">批量导入</button>
    <button class="btn ghost" id="btn-batch-export">批量导出</button>
    <button class="btn ghost" id="btn-view-all-logs" style="gap:4px">📋 查看日志</button>
  </div>
  <div class="layout">
    <div class="sidebar">
      <div class="shd">
        <label class="saw">
          <input type="checkbox" id="check-all">
          <span>全选</span>
        </label>
        <span class="title" id="rls-title">规则列表</span>
        <span class="count" id="rule-count">共 0 个</span>
      </div>
      <div class="rls" id="rls">
      </div>
    </div>
    <div class="ca">
      <div class="rhd" id="rhd" style="display:none">
        <div class="rhi">
          <div class="rhn" id="rhn">—</div>
          <div class="rhd2" id="rhd2">
          </div>
        </div>
        <div class="rha">
          <div class="zgp" id="zgp" style="display:none">
            <button id="btn-zout">−</button>
            <span class="zvl" id="zvl">100%</span>
            <button id="btn-zin">+</button>
            <button id="btn-zreset">⟲</button>
          </div>
          <button class="btn" id="btn-save-rule" style="display:none">保存规则</button>
          <button class="btn btn-draft" id="btn-draft-rule" style="display:none">暂存规则</button>
          <button class="btn" id="btn-preview-rule" style="display:none;color:#7c3aed;border-color:#ddd6fe">预览</button>
          <button class="btn danger" id="btn-del-rule" style="display:none">删除</button>
        </div>
      </div>
      <div class="cw" id="cw" style="top:0">
        <div class="nrp" id="nrp">
          <div class="nri">📋</div>
          <p>请从左侧选择一条规则，或新建规则</p>
        </div>
        <div class="lko" id="lko" style="display:none">
          <div class="lkc">
            <div class="lci">✏️</div>
            <p>点击按钮开始编辑规则流程</p>
            <button class="btn primary" id="btn-draw-rule-lock" style="white-space:nowrap;height:28px;padding:0 12px;font-size:12px">绘制规则</button>
          </div>
        </div>
        <div class="cbg" id="cbg" style="display:none">
        </div>
        <div class="runtime-legend" id="runtime-legend">
          <div class="rl-title rl-pulse">👁 预览状态</div>
          <div class="rl-row">
            <span class="rl-dot green">
            </span>条件满足</div>
            <div class="rl-row">
              <span class="rl-dot red">
              </span>条件不满足</div>
            </div>
            <div class="canvas" id="canvas">
            </div>
          </div>
        </div>
      </div>
      <div class="dma" id="dma">
      </div>
      <div class="drawer" id="drawer">
        <div class="dh">
          <h3 id="dh-title">配置</h3>
          <div class="close" id="drawer-close">×</div>
        </div>
        <div class="pin" id="pin" style="display:none">
        </div>
        <div class="tabs" id="dts" style="display:none">
        </div>
        <div class="dbody" id="dbody">
        </div>
      </div>
      <div class="plu" id="plu">
        <div class="pmt">选择要插入的节点类型</div>
        <div class="pmg" id="pmg">
        </div>
      </div>
      <div class="toast" id="toast">
      </div>
      <div class="mma" id="mma">
        <div class="modal" id="modal">
        </div>
      </div>
      <div class="mma" id="rule-modal-mask">
        <div class="rule-form-modal" id="rule-form-modal">
          <h3 id="rft">新建规则</h3>
          <div class="rff">
            <label>规则名称</label>
            <input type="text" id="rf-name" placeholder="请输入" maxlength="50" />
          </div>
          <div class="rff">
            <label>规则描述</label>
            <textarea id="rf-desc" placeholder="请输入">
            </textarea>
          </div>
          <div class="rff">
            <label>轮询间隔 <span style="font-size:11px;color:var(--muted);font-weight:400">（最大 30 天；上一次执行未结束时，等其完成后再计时）</span>
          </label>
          <div class="poll-row">
            <input type="number" id="rf-poll-d" min="0" max="30" placeholder="0" value="0" />
            <span class="poll-unit">天</span>
            <input type="number" id="rf-poll-h" min="0" max="23" placeholder="0" value="0" />
            <span class="poll-unit">时</span>
            <input type="number" id="rf-poll-m" min="0" max="59" placeholder="0" value="0" />
            <span class="poll-unit">分</span>
            <input type="number" id="rf-poll-s" min="0" max="59" placeholder="30" value="30" />
            <span class="poll-unit">秒</span>
          </div>
          <div style="font-size:11px;color:var(--muted);margin-top:5px" id="rph">当前间隔：30 秒</div>
        </div>
        <div class="rma">
          <button class="btn" id="rf-cancel">取消</button>
          <button class="btn primary" id="rf-confirm">确定</button>
        </div>
      </div>
    </div>
    <div class="mma" id="log-modal-mask" style="z-index:1300">
      <div class="log-modal" id="log-modal">
        <div class="lm-header">
          <div class="lm-title" id="lm-title">日志记录</div>
          <div class="lm-filters">
            <select id="lm-filter-level">
              <option value="">全部级别</option>
              <option value="info">信息</option>
              <option value="success">成功</option>
              <option value="error">错误</option>
            </select>
            <select id="lm-filter-rule" style="max-width:160px">
              <option value="">全部规则</option>
            </select>
            <span style="font-size:12px;color:var(--muted);white-space:nowrap">时间</span>
            <input type="datetime-local" id="lm-filter-ts-start" style="height:28px;border:1px solid var(--line);border-radius:5px;padding:0 6px;font-size:11px;font-family:inherit;outline:none;color:var(--ink)" title="起始时间">
            <span style="font-size:11px;color:var(--muted)">至</span>
            <input type="datetime-local" id="lm-filter-ts-end" style="height:28px;border:1px solid var(--line);border-radius:5px;padding:0 6px;font-size:11px;font-family:inherit;outline:none;color:var(--ink)" title="结束时间">
            <button class="btn btn-draft" id="btn-clear-logs" style="height:28px;padding:0 10px;font-size:11px;display:none">清空日志</button>
          </div>
          <div class="close" id="lm-close" style="margin-left:12px;cursor:pointer;color:var(--muted);font-size:18px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0">×</div>
        </div>
        <div class="lm-body" id="lm-body">
        </div>
        <div class="lm-footer" id="lm-footer">共 0 条日志</div>
      </div>
    </div>
    <div class="tip" id="tip">
    </div>
    <input type="file" id="import-file-input" accept=".json,.zip" multiple style="display:none">
    <div class="mma" id="import-result-mask" style="z-index:1200">
      <div class="modal" id="import-result-modal" style="max-width:480px;min-width:380px">
        <h3 style="margin-bottom:14px">导入结果</h3>
        <div id="import-result-body">
        </div>
        <div class="actions" style="margin-top:18px">
          <button class="btn primary" id="import-result-ok">确定</button>
        </div>
      </div>
    </div>
    <div class="mma" id="ppm" style="z-index:1100">
      <div class="ppw">
        <h3>选择参数</h3>
        <div class="psr">
          <span class="ps-icon">🔍</span>
          <input type="text" id="param-search-input" placeholder="搜索参数名称或描述…" />
        </div>
        <div class="plw">
          <div id="ppl">
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:10px">
          <button class="btn" id="param-picker-cancel">取消</button>
          <button class="btn primary" id="param-picker-ok">确定</button>
        </div>
      </div>
    </div>
